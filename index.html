<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- iOS status bar style: black so the game shows through -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>TOILET TRUMP</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Full-screen wrapper — takes up the entire phone screen -->
    <div id="game-wrapper">

        <!-- Header bar: title | score | fullscreen button -->
        <div id="header">
            <span id="title">TOILET TRUMP</span>
            <span id="score-display">Score: <span id="score">0</span></span>
            <!-- Fullscreen toggle button (top-right corner) -->
            <button id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
        </div>

        <!-- Game canvas — fills all remaining height -->
        <div id="game-container">

            <div id="stars"></div>
            <img id="player" src="player2.gif" alt="Player Ship" />

            <!-- Win / Game Over overlay -->
            <div id="message" class="hidden">
                <p id="message-text"></p>
                <button id="restart-btn" onclick="restartGame()">Play Again 🚀</button>
            </div>

        </div>

        <!-- Touch controls pinned at the bottom -->
        <div id="touch-controls">

            <button id="btn-left" ontouchstart="keys['ArrowLeft']=true" ontouchend="keys['ArrowLeft']=false"
                onmousedown="keys['ArrowLeft']=true" onmouseup="keys['ArrowLeft']=false"
                onmouseleave="keys['ArrowLeft']=false">◀</button>

            <button id="btn-fire" ontouchstart="keys['Space']=true" ontouchend="keys['Space']=false"
                onmousedown="keys['Space']=true" onmouseup="keys['Space']=false"
                onmouseleave="keys['Space']=false">🤬</button>

            <button id="btn-right" ontouchstart="keys['ArrowRight']=true" ontouchend="keys['ArrowRight']=false"
                onmousedown="keys['ArrowRight']=true" onmouseup="keys['ArrowRight']=false"
                onmouseleave="keys['ArrowRight']=false">▶</button>

        </div>

    </div>

    <script src="game.js"></script>

    <script>
        /* ---- Fullscreen API ---- */
        function toggleFullscreen() {
            const el = document.documentElement;
            const btn = document.getElementById("fs-btn");

            if (!document.fullscreenElement &&
                !document.webkitFullscreenElement) {
                // Enter fullscreen
                const req = el.requestFullscreen || el.webkitRequestFullscreen;
                if (req) req.call(el);
                btn.textContent = "✕";
            } else {
                // Exit fullscreen
                const ex = document.exitFullscreen || document.webkitExitFullscreen;
                if (ex) ex.call(document);
                btn.textContent = "⛶";
            }
        }

        // Keep button icon in sync when user presses Escape
        document.addEventListener("fullscreenchange", syncFsBtn);
        document.addEventListener("webkitfullscreenchange", syncFsBtn);
        function syncFsBtn() {
            const btn = document.getElementById("fs-btn");
            if (btn) btn.textContent =
                (document.fullscreenElement || document.webkitFullscreenElement)
                    ? "✕" : "⛶";
        }
    </script>

</body>

</html>
